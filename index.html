<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAD & Website Time Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --blue: #378ADD;
    --blue-dark: #185FA5;
    --blue-light: #E6F1FB;
    --amber: #BA7517;
    --amber-dark: #854F0B;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --bg: #f9f9f7;
    --surface: #ffffff;
    --surface2: #f3f3f0;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-hint: #9b9b96;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --mono: 'SF Mono', 'Fira Code', Consolas, monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #18181a;
      --surface: #232325;
      --surface2: #2c2c2f;
      --border: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.18);
      --text: #f0f0ec;
      --text-muted: #9b9b96;
      --text-hint: #6b6b67;
      --green-light: #0a3326;
      --blue-light: #0a1f38;
      --amber-light: #2e1e04;
      --red-light: #2e0f0f;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  .page {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-icon {
    width: 36px; height: 36px;
    background: var(--green-light);
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    color: var(--green);
    font-size: 18px;
  }
  .header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .sync-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500;
    padding: 5px 12px; border-radius: 99px;
    color: var(--green); background: var(--green-light);
    border: 0.5px solid rgba(29,158,117,0.25);
    transition: all 0.2s;
  }
  .sync-badge.syncing { color: var(--amber); background: var(--amber-light); border-color: rgba(186,117,23,0.25); }
  .sync-badge.error   { color: var(--red);   background: var(--red-light);   border-color: rgba(163,45,45,0.25); }

  .ss-link {
    font-size: 12px; color: var(--text-muted); text-decoration: none;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 10px; border-radius: 99px;
    border: 0.5px solid var(--border-mid);
    transition: color 0.15s, border-color 0.15s;
  }
  .ss-link:hover { color: var(--text); border-color: var(--text-muted); }

  /* App tabs */
  .app-tabs {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 1.5rem;
  }
  .app-tab {
    padding: 12px 8px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    cursor: pointer; text-align: center;
    font-size: 13px; font-weight: 500;
    color: var(--text-muted);
    transition: all 0.15s;
    user-select: none;
  }
  .app-tab:hover { border-color: var(--border-mid); color: var(--text); }
  .app-tab .tab-icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .app-tab.active-brics { background: var(--green-light); border-color: rgba(29,158,117,0.4); color: var(--green-dark); }
  .app-tab.active-revit { background: var(--blue-light);  border-color: rgba(55,138,221,0.4); color: var(--blue-dark); }
  .app-tab.active-web   { background: var(--amber-light); border-color: rgba(186,117,23,0.4); color: var(--amber-dark); }

  /* Stats */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-bottom: 1.5rem;
  }
  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--text); }

  /* Timer card */
  .timer-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .timer-display {
    font-family: var(--mono);
    font-size: 48px; font-weight: 500;
    color: var(--text);
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 1.25rem;
    transition: color 0.2s;
  }
  .timer-display.running-brics { color: var(--green); }
  .timer-display.running-revit { color: var(--blue); }
  .timer-display.running-web   { color: var(--amber); }

  .project-row { margin-bottom: 1rem; }
  .project-row input {
    width: 100%; padding: 10px 14px;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px; font-family: var(--font);
    outline: none; transition: border-color 0.15s;
  }
  .project-row input:focus { border-color: var(--green); }
  .project-row input::placeholder { color: var(--text-hint); }
  .project-row input:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 11px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center; gap: 6px;
    transition: all 0.15s; border: 0.5px solid transparent;
    font-family: var(--font);
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-start-brics { background: var(--green); color: #fff; border-color: var(--green); }
  .btn-start-brics:hover:not(:disabled) { background: var(--green-dark); }
  .btn-start-revit { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn-start-revit:hover:not(:disabled) { background: var(--blue-dark); }
  .btn-start-web { background: var(--amber); color: #fff; border-color: var(--amber); }
  .btn-start-web:hover:not(:disabled) { background: var(--amber-dark); }
  .btn-stop {
    background: var(--red-light); color: var(--red);
    border-color: rgba(163,45,45,0.25);
  }
  .btn-stop:hover:not(:disabled) { background: rgba(163,45,45,0.15); }

  /* Sessions */
  .sessions-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1.25rem;
  }
  .sessions-header {
    display: flex; justify-content: space-between;
    align-items: center; margin-bottom: 1rem;
    flex-wrap: wrap; gap: 8px;
  }
  .sessions-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .export-btns { display: flex; gap: 6px; }
  .export-btn {
    font-size: 12px; font-weight: 500;
    padding: 6px 12px; border-radius: 99px;
    border: 0.5px solid var(--border-mid);
    background: var(--surface2); color: var(--text-muted);
    cursor: pointer; display: flex; align-items: center; gap: 4px;
    transition: all 0.15s; font-family: var(--font);
  }
  .export-btn:hover { color: var(--text); border-color: var(--text-muted); }

  .filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 12px; padding: 4px 12px; border-radius: 99px;
    border: 0.5px solid var(--border);
    background: var(--surface2); color: var(--text-muted);
    cursor: pointer; transition: all 0.15s; font-family: var(--font);
  }
  .filter-btn.active {
    border-color: var(--border-mid);
    color: var(--text); background: var(--surface);
  }

  .sessions-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
  .session-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 13px;
  }
  .session-date { color: var(--text-muted); min-width: 86px; white-space: nowrap; }
  .session-project { color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-dur { font-family: var(--mono); color: var(--text); font-size: 12px; min-width: 52px; text-align: right; white-space: nowrap; }
  .session-del {
    background: none; border: none; color: var(--text-hint);
    cursor: pointer; font-size: 15px; padding: 2px 0 2px 6px;
    line-height: 1; transition: color 0.15s;
  }
  .session-del:hover { color: var(--red); }

  .badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 99px; margin-right: 5px;
    white-space: nowrap; flex-shrink: 0;
  }
  .badge-brics { background: var(--green-light); color: var(--green-dark); }
  .badge-revit  { background: var(--blue-light);  color: var(--blue-dark); }
  .badge-web    { background: var(--amber-light);  color: var(--amber-dark); }

  .empty {
    text-align: center; color: var(--text-hint);
    font-size: 14px; padding: 2.5rem 0;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%);
    background: #1a1a18; color: #f0f0ec;
    padding: 10px 20px; border-radius: 99px;
    font-size: 13px; font-weight: 500;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    white-space: nowrap; z-index: 9999;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 480px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .stats .stat:last-child { grid-column: span 2; }
    .timer-display { font-size: 36px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <div class="header-icon">⏱</div>
      <h1>Time Tracker</h1>
    </div>
    <div class="header-right">
      <div class="sync-badge" id="sync-badge">☁ Synced</div>
      <a href="https://app.smartsheet.eu/sheets/RChHq7gjHWfpQ6jfHwFWv9cJQ3pqQmmx4VcHXxQ1" class="ss-link" target="_blank">↗ Smartsheet</a>
    </div>
  </div>

  <div class="app-tabs">
    <div class="app-tab active-brics" id="tab-bricscad" onclick="switchApp('bricscad')">
      <span class="tab-icon">📐</span>BricsCAD
    </div>
    <div class="app-tab" id="tab-revit" onclick="switchApp('revit')">
      <span class="tab-icon">🏗</span>Revit LT
    </div>
    <div class="app-tab" id="tab-website" onclick="switchApp('website')">
      <span class="tab-icon">🌐</span>Website Work
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label" id="stat-today-label">BricsCAD today</div>
      <div class="stat-value" id="stat-today">0h 0m</div>
    </div>
    <div class="stat">
      <div class="stat-label" id="stat-week-label">BricsCAD this week</div>
      <div class="stat-value" id="stat-week">0h 0m</div>
    </div>
    <div class="stat">
      <div class="stat-label">Sessions</div>
      <div class="stat-value" id="stat-count">0</div>
    </div>
  </div>

  <div class="timer-card">
    <div class="timer-display" id="timer-display">00:00:00</div>
    <div class="project-row">
      <input type="text" id="project-input" placeholder="Project / task name (optional)" />
    </div>
    <div class="btn-row">
      <button class="btn btn-start-brics" id="btn-start" onclick="startTimer()">▶ Start</button>
      <button class="btn btn-stop" id="btn-stop" onclick="stopTimer()" disabled>⏸ Stop &amp; save</button>
    </div>
  </div>

  <div class="sessions-card">
    <div class="sessions-header">
      <span class="sessions-title">Session log</span>
      <div class="export-btns">
        <button class="export-btn" onclick="exportCSV()">↓ CSV</button>
        <button class="export-btn" onclick="exportICS()">📅 Outlook ICS</button>
      </div>
    </div>
    <div class="filter-row">
      <button class="filter-btn active" id="filter-all"      onclick="setFilter('all')">All</button>
      <button class="filter-btn"        id="filter-bricscad" onclick="setFilter('bricscad')">BricsCAD</button>
      <button class="filter-btn"        id="filter-revit"    onclick="setFilter('revit')">Revit LT</button>
      <button class="filter-btn"        id="filter-website"  onclick="setFilter('website')">Website Work</button>
    </div>
    <div class="sessions-list" id="sessions-list">
      <div class="empty">No sessions yet — hit Start to begin logging.</div>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const SHEET_ID = 2272271928526724;
const COL = {
  date:    1108101593958276,
  time:    5611701221328772,
  app:     3359901407643524,
  project: 7863501035014024,
  mins:    2234001500800900,
  hrs:     6737601128171396
};
const STORAGE_KEY = 'cad_tracker_sessions_v1';

// ── State ────────────────────────────────────────────────────────────────────
let startTime = null, elapsed = 0, timerInterval = null;
let sessions = [], currentApp = 'bricscad', sessionFilter = 'all';

const appConfig = {
  bricscad: { label: 'BricsCAD',     startClass: 'btn-start-brics', runClass: 'running-brics', badgeClass: 'badge-brics', tabActive: 'active-brics' },
  revit:    { label: 'Revit LT',     startClass: 'btn-start-revit', runClass: 'running-revit', badgeClass: 'badge-revit', tabActive: 'active-revit' },
  website:  { label: 'Website Work', startClass: 'btn-start-web',   runClass: 'running-web',   badgeClass: 'badge-web',   tabActive: 'active-web' }
};

// ── Persistence ──────────────────────────────────────────────────────────────
function load() {
  try { sessions = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]').map(s => ({...s, app: s.app||'bricscad'})); } catch(e) { sessions = []; }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); } catch(e) {}
}

// ── UI Helpers ───────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setSyncBadge(state) {
  const el = document.getElementById('sync-badge');
  if (state === 'syncing') { el.className = 'sync-badge syncing'; el.textContent = '↻ Syncing…'; }
  else if (state === 'error') { el.className = 'sync-badge error'; el.textContent = '✕ Sync failed'; }
  else { el.className = 'sync-badge'; el.textContent = '☁ Synced'; }
}

function fmt(secs) {
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function fmtDur(secs) {
  const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60);
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

// ── App switching ────────────────────────────────────────────────────────────
function switchApp(app) {
  if (timerInterval) { showToast('Stop the current session before switching'); return; }
  currentApp = app;
  Object.keys(appConfig).forEach(k => {
    document.getElementById('tab-'+k).className = 'app-tab' + (k === app ? ' '+appConfig[k].tabActive : '');
  });
  document.getElementById('btn-start').className = 'btn ' + appConfig[app].startClass;
  document.getElementById('stat-today-label').textContent = appConfig[app].label + ' today';
  document.getElementById('stat-week-label').textContent  = appConfig[app].label + ' this week';
  document.getElementById('timer-display').className = 'timer-display';
  updateStats();
}

// ── Filter ───────────────────────────────────────────────────────────────────
function setFilter(f) {
  sessionFilter = f;
  ['all','bricscad','revit','website'].forEach(k => {
    document.getElementById('filter-'+k).classList.toggle('active', k === f);
  });
  renderSessions();
}

// ── Timer ────────────────────────────────────────────────────────────────────
function startTimer() {
  startTime = Date.now() - elapsed * 1000;
  timerInterval = setInterval(() => {
    elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('timer-display').textContent = fmt(elapsed);
    document.getElementById('timer-display').className = 'timer-display ' + appConfig[currentApp].runClass;
  }, 1000);
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled  = false;
  document.getElementById('project-input').disabled = true;
}

async function stopTimer() {
  clearInterval(timerInterval); timerInterval = null;
  document.getElementById('timer-display').className = 'timer-display';
  if (elapsed < 5) {
    elapsed = 0;
    document.getElementById('timer-display').textContent = '00:00:00';
    document.getElementById('btn-start').disabled = false;
    document.getElementById('btn-stop').disabled  = true;
    document.getElementById('project-input').disabled = false;
    return;
  }
  const now = new Date();
  const project = document.getElementById('project-input').value.trim() || appConfig[currentApp].label + ' session';
  const session = { id: Date.now(), date: now.toISOString(), project, secs: elapsed, app: currentApp };
  sessions.unshift(session);
  save();
  elapsed = 0;
  document.getElementById('timer-display').textContent = '00:00:00';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled  = true;
  document.getElementById('project-input').disabled = false;
  document.getElementById('project-input').value = '';
  renderSessions(); updateStats();
  const ok = await syncToSmartsheet(session);
  showToast(ok ? '✓ Session saved & synced to Smartsheet' : 'Session saved locally (Smartsheet sync failed)');
}

// ── Smartsheet sync ──────────────────────────────────────────────────────────
async function syncToSmartsheet(session) {
  setSyncBadge('syncing');
  try {
    const d = new Date(session.date);
    const dateStr = d.toLocaleDateString('en-IE', { day:'2-digit', month:'short', year:'numeric' });
    const timeStr = d.toLocaleTimeString('en-IE', { hour:'2-digit', minute:'2-digit' });
    const cfg     = appConfig[session.app] || appConfig.bricscad;
    const mins    = Math.round(session.secs / 60);
    const hrs     = (session.secs / 3600).toFixed(2);

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: 'You are a Smartsheet assistant. Add a row to the specified sheet using the smartsheet MCP. Respond only with: DONE if successful, or ERROR: <reason> if not.',
        messages: [{ role: 'user', content:
          `Add a row to Smartsheet sheet ID ${SHEET_ID} with these column values:\n` +
          `- Column ${COL.date} (Date): "${dateStr}"\n` +
          `- Column ${COL.time} (Time): "${timeStr}"\n` +
          `- Column ${COL.app} (App): "${cfg.label}"\n` +
          `- Column ${COL.project} (Project): "${session.project}"\n` +
          `- Column ${COL.mins} (Duration mins): "${mins}"\n` +
          `- Column ${COL.hrs} (Duration hrs): "${hrs}"`
        }],
        mcp_servers: [{ type: 'url', url: 'https://mcp.smartsheet.eu', name: 'smartsheet-mcp' }]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b => b.type==='text').map(b => b.text).join('');
    if (text.includes('ERROR')) throw new Error(text);
    setSyncBadge('ok');
    return true;
  } catch(e) {
    setSyncBadge('error');
    return false;
  }
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderSessions() {
  const el = document.getElementById('sessions-list');
  const list = sessionFilter === 'all' ? sessions : sessions.filter(s => s.app === sessionFilter);
  if (!list.length) { el.innerHTML = '<div class="empty">No sessions yet — hit Start to begin logging.</div>'; return; }
  el.innerHTML = list.map(s => {
    const d   = new Date(s.date);
    const cfg = appConfig[s.app] || appConfig.bricscad;
    const ds  = d.toLocaleDateString('en-IE', { day:'2-digit', month:'short' });
    const ts  = d.toLocaleTimeString('en-IE', { hour:'2-digit', minute:'2-digit' });
    return `<div class="session-row">
      <span class="session-date">${ds} ${ts}</span>
      <span class="session-project"><span class="badge ${cfg.badgeClass}">${cfg.label}</span>${escHtml(s.project)}</span>
      <span class="session-dur">${fmtDur(s.secs)}</span>
      <button class="session-del" onclick="deleteSession(${s.id})" title="Delete session">✕</button>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStats() {
  const now = new Date(), todayStr = now.toDateString();
  const weekAgo = Date.now() - 7*24*3600*1000;
  let todaySecs = 0, weekSecs = 0, count = 0;
  sessions.filter(s => s.app === currentApp).forEach(s => {
    count++;
    const d = new Date(s.date);
    if (d.toDateString() === todayStr) todaySecs += s.secs;
    if (d.getTime() >= weekAgo) weekSecs += s.secs;
  });
  document.getElementById('stat-today').textContent = fmtDur(todaySecs) || '0h 0m';
  document.getElementById('stat-week').textContent  = fmtDur(weekSecs)  || '0h 0m';
  document.getElementById('stat-count').textContent = count;
}

function deleteSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  save(); renderSessions(); updateStats();
}

// ── Exports ──────────────────────────────────────────────────────────────────
function getExport() { return sessionFilter === 'all' ? sessions : sessions.filter(s => s.app === sessionFilter); }

function exportCSV() {
  const exp = getExport();
  if (!exp.length) { showToast('No sessions to export'); return; }
  const rows = [['App','Date','Time','Project','Duration (mins)','Duration (hrs)']];
  exp.forEach(s => {
    const d = new Date(s.date), cfg = appConfig[s.app]||appConfig.bricscad;
    rows.push([cfg.label, d.toLocaleDateString('en-IE'), d.toLocaleTimeString('en-IE',{hour:'2-digit',minute:'2-digit'}), s.project, Math.round(s.secs/60), (s.secs/3600).toFixed(2)]);
  });
  dl(rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n'), 'hours.csv', 'text/csv');
  showToast('CSV downloaded');
}

function exportICS() {
  const exp = getExport();
  if (!exp.length) { showToast('No sessions to export'); return; }
  const icsDate = d => d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//CAD Time Tracker//EN','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  exp.forEach(s => {
    const start = new Date(s.date), end = new Date(start.getTime()+s.secs*1000);
    const cfg = appConfig[s.app]||appConfig.bricscad;
    lines.push('BEGIN:VEVENT',`UID:tracker-${s.id}@timetracker`,`DTSTART:${icsDate(start)}`,`DTEND:${icsDate(end)}`,`SUMMARY:[${cfg.label}] ${s.project}`,`DESCRIPTION:${cfg.label} session — ${Math.round(s.secs/60)} min`,'END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  dl(lines.join('\r\n'), 'sessions.ics', 'text/calendar');
  showToast('ICS downloaded — open in Outlook to import');
}

function dl(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = filename; a.click();
}

// ── Init ─────────────────────────────────────────────────────────────────────
load(); renderSessions(); updateStats();
</script>
</body>
</html>
